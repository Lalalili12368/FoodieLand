<!DOCTYPE html>

<head>
    <title>Contact Us - Foodieland</title>

    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>


    <nav class="navbar navbar-expand-lg bg-white">
        <div class="container">

            <a class="navbar-brand logo-text" href="#">Foodieland</a>

            <ul class="navbar-nav ms-auto">
                <li><a class="nav-link" href="index.html"><b>Home</b></a></li>
                <li><a class="nav-link" href="#"><b>Recipes</b></a></li>
                <li><a class="nav-link" href="#"><b>Blog</b></a></li>
                <li><a class="nav-link" href="contact.html"><b>Contact</b></a></li>
                <li><a class="nav-link" href="about.html"><b>About Us</b></a></li>
            </ul>

        </div>
    </nav>

    <!-- TITLE -->
    <section class="container text-center mt-5">
        <h1 style="font-family:'Pacifico' ,cursive">Contact Us</h1>
    </section>

    <!-- CONTENT -->
    <section class="container mt-5">
        <div class="row align-items-center">

            <!-- IMAGE -->
            <div class="col-md-6 text-center">
                <img src="Images/chef1.png" class="img-fluid contact-img">
            </div>

            <!-- FORM -->
            <div class="col-md-6">

                <form>

                    <div class="mb-2">
                        <label><b>Name</b></label>
                        <input class="form-control" placeholder="Name">
                    </div>

                    <div class="mb-2">
                        <label><b>Email</b></label>
                        <input type="email" class="form-control" placeholder="Email">
                    </div>

                    <div class="mb-2">
                        <label><b>Subject</b></label>
                        <input class="form-control" placeholder="Subject">
                    </div>

                    <div class="mb-2">
                        <label><b>Type</b></label>
                        <select class="form-control">
                            <option>Advertising</option>
                            <option>Commercial</option>
                            <option>Support</option>
                        </select>
                    </div>

                    <div class="mb-2">
                        <label><b>Message</b></label>
                        <textarea class="form-control" rows="5"></textarea>
                    </div>

                    <button class="btn btn-dark w-100">Submit</button>

                </form>

            </div>

        </div>
    </section>

    <!-- FOOTER -->
    <footer class="text-center mt-5 p-3">
        <p>2026 Foodieland</p>
    </footer>

</body>

</html>
